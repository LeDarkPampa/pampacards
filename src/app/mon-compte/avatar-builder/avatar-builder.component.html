<div class="avatar-creator">
  <h2>Création d'Avatar</h2>

  <p-messages [(value)]="message" [enableService]="false"></p-messages>

  <p class="avatar-unsaved-hint" *ngIf="hasUnsavedChanges && !loading" role="status">
    Modifications non enregistrées
  </p>

  <div class="avatar-preview-wrap">
    <div class="avatar-loading" *ngIf="loading" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <span class="avatar-loading-text">Chargement…</span>
    </div>

    <div class="avatar-preview" [class.avatar-preview-dimmed]="loading">
      <app-avatar-view
        [head]="selectedParts.head"
        [hat]="selectedParts.hat"
        [body]="selectedParts.body"
        [back]="selectedParts.back"
        [add]="selectedParts.add"
        [front]="selectedParts.front"
      >
      </app-avatar-view>
    </div>
  </div>

  <div class="avatar-toolbar ligne-centree">
    <button type="button" class="ui-btn-secondary avatar-tool-btn" (click)="cancelChanges()" [disabled]="loading || !hasUnsavedChanges">
      Annuler les changements
    </button>
  </div>

  <div class="selection-panel" [attr.aria-busy]="loading">
    <div class="selection" *ngFor="let sec of sections">
      <h4 [id]="'avatar-sec-' + sec.partsKey">{{ sec.title }}</h4>

      <div class="tabs" role="tablist" [attr.aria-labelledby]="'avatar-sec-' + sec.partsKey">
        <button
          *ngIf="sec.optionalEmpty"
          type="button"
          class="tab-none"
          (click)="clearOptionalSlot(sec.slot)"
          [class.selected]="selectedCategories[sec.partsKey] === ''"
          [attr.aria-selected]="selectedCategories[sec.partsKey] === ''"
          role="tab"
          [attr.aria-label]="'Aucun ' + sec.ariaPieceLabel"
        >
          <img [src]="'assets/avatars/no-elem.png'" alt="" />
        </button>

        <button
          *ngFor="let category of visibleTabCategories[sec.partsKey]"
          type="button"
          (click)="filterParts(sec.partsKey, category)"
          [class.active]="selectedCategories[sec.partsKey] === category"
          [attr.aria-selected]="selectedCategories[sec.partsKey] === category"
          role="tab"
          [attr.id]="'tab-' + sec.partsKey + '-' + category"
        >
          {{ category }}
        </button>
      </div>

      <div
        class="options"
        role="tabpanel"
        *ngIf="!sec.optionalEmpty || selectedCategories[sec.partsKey] !== ''"
      >
        <button
          *ngFor="let piece of filteredParts[sec.partsKey]; trackBy: trackBySrc"
          type="button"
          class="option-thumb"
          [class.selected]="piece.src === selectedParts[sec.slot]"
          [class.locked]="!isDebloquePiece(piece)"
          (click)="onPieceClick(sec.slot, piece)"
          (keydown)="onPieceKeydown($event, sec.slot, piece)"
          [attr.aria-label]="
            (isDebloquePiece(piece) ? 'Choisir ' : 'Verrouillé — ') + sec.ariaPieceLabel + ' : ' + piece.category
          "
          [attr.aria-pressed]="piece.src === selectedParts[sec.slot]"
        >
          <img [src]="piece.src" alt="" loading="lazy" />
        </button>
      </div>
    </div>
  </div>

  <div class="ligne-centree save-avatar">
    <button type="button" class="ui-btn-primary" (click)="saveAvatar()" [disabled]="loading">Sauvegarder mon avatar</button>
  </div>
</div>

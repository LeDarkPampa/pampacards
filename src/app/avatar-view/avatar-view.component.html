<div class="avatar-view">
  <div class="avatar-container">
    <img class="avatar-part hat" [src]="hat" *ngIf="hat" alt="" />
    <img class="avatar-part head" [src]="head" alt="Tête de l'avatar" />
    <img class="avatar-part body" [src]="body" alt="Corps de l'avatar" />
    <img class="avatar-part back" [src]="back" *ngIf="back" alt="" />
    <img class="avatar-part add" [src]="add" *ngIf="add" alt="" />
    <img class="avatar-part front" [src]="front" *ngIf="front" alt="" />
  </div>
</div>
